<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plonopolis</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="auth-screen" class="screen active">
    <div class="auth-bg-layer"></div>
    <div class="auth-overlay"></div>

    <div class="auth-topbar">
      <div class="language-switch">
        <button data-lang="pl" class="lang-btn active">PL</button>
        <button data-lang="en" class="lang-btn">EN</button>
      </div>
    </div>

    <div class="auth-center-wrap">
      <div class="auth-card">
        <div class="tabs auth-tabs">
          <button id="login-tab" class="tab-btn active" type="button">Logowanie</button>
          <button id="register-tab" class="tab-btn" type="button">Rejestracja</button>
        </div>

        <h1 class="auth-title">Plonopolis</h1>
        <p id="auth-subtitle" class="auth-subtitle">Zaloguj się do swojej farmy</p>

        <form id="auth-form" class="auth-form" autocomplete="on">
          <label class="auth-field">
            <span id="login-label">Login</span>
            <input id="auth-login" type="text" required />
          </label>

          <label id="register-email-wrapper" class="auth-field hidden">
            <span id="email-label">Email</span>
            <input id="auth-email" type="email" />
          </label>

          <label class="auth-field">
            <span id="password-label">Hasło</span>
            <input id="auth-password" type="password" required />
          </label>

          <label id="confirm-wrapper" class="auth-field hidden">
            <span id="confirm-label">Powtórz hasło</span>
            <input id="auth-confirm" type="password" />
          </label>

          <label class="remember-row" id="remember-wrapper">
            <input id="remember-me" type="checkbox" />
            <span id="remember-label">Zapamiętaj mnie</span>
          </label>

          <button class="auth-submit-btn" id="auth-submit" type="submit">Zaloguj się</button>
        </form>

        <p id="auth-message" class="auth-message"></p>
      </div>
    </div>
  </div>

  <div id="game-screen" class="screen">
    <header class="topbar panel">
      <div class="top-left">
        <div><strong id="player-name">Gracz</strong></div>
        <div><span id="level-label">Poziom</span>: <span id="player-level">1</span></div>
      </div>

      <div class="exp-wrap">
        <div class="exp-head">
          <span id="exp-label">EXP</span>
          <span id="exp-percent">0%</span>
        </div>
        <div class="exp-bar"><div id="exp-fill"></div></div>
      </div>

      <div class="resources">
        <div>⭐ <span id="player-points">0</span></div>
        <div>💰 <span id="coins">0</span></div>
        <div>♻️ <span id="compost">0</span>/250</div>
      </div>

      <div class="top-actions">
        <button id="ranking-btn" class="small-btn">Ranking</button>
        <button id="upgrades-btn" class="small-btn">Ulepszenia</button>
        <button id="logout-btn" class="small-btn danger">Wyloguj</button>
      </div>

      <div class="save-box">
        <span id="points-label">Punkty</span>
        <span id="save-status">Zapisano</span>
      </div>
    </header>

    <main class="game-area">
      <div id="ranch-scene" class="scene">
        <img id="ranch-image" alt="Ranczo" />
        <button id="house-hitbox" class="hitbox" aria-label="Dom"></button>
        <button id="shed-hitbox" class="hitbox" aria-label="Szopa"></button>
        <button id="field-hitbox" class="hitbox" aria-label="Pole"></button>
      </div>
    </main>

    <div id="toast"></div>

    <div id="modal-backdrop" class="hidden">
      <div id="modal" class="panel"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>

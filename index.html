<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plonopolis</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="auth-screen" class="screen active">
    <div class="auth-card panel">
      <h1>🌾 Plonopolis</h1>
      <p id="auth-subtitle">Przeglądarkowy prototyp HTML5</p>

      <div class="language-switch">
        <button data-lang="pl" class="lang-btn active">PL</button>
        <button data-lang="en" class="lang-btn">EN</button>
      </div>

      <div class="tabs">
        <button id="login-tab" class="tab-btn active">Logowanie</button>
        <button id="register-tab" class="tab-btn">Rejestracja</button>
      </div>

      <form id="auth-form">
        <label>
          <span id="email-label">Email</span>
          <input id="auth-email" type="email" required />
        </label>
        <label>
          <span id="password-label">Hasło</span>
          <input id="auth-password" type="password" required />
        </label>
        <label id="confirm-wrapper" class="hidden">
          <span id="confirm-label">Powtórz hasło</span>
          <input id="auth-confirm" type="password" />
        </label>
        <button class="primary-btn" id="auth-submit" type="submit">Zaloguj się</button>
      </form>
      <p id="auth-message" class="message"></p>
    </div>
  </div>

  <div id="game-screen" class="screen">
    <header class="topbar panel">
      <div class="top-left">
        <div><strong id="player-name">Gracz</strong></div>
        <div><span id="level-label">Poziom</span>: <span id="player-level">1</span></div>
        <div><span id="points-label">Punkty</span>: <span id="player-points">0</span></div>
      </div>
      <div class="exp-wrap">
        <div class="exp-head">
          <span id="exp-label">EXP</span>
          <span id="exp-percent">0%</span>
        </div>
        <div class="exp-bar"><div id="exp-fill"></div></div>
      </div>
      <div class="resources">
        <div>💰 <span id="coins">0</span></div>
        <div>♻️ <span id="compost">0</span>/250</div>
        <div>💾 <span id="save-status">—</span></div>
      </div>
      <div class="top-actions">
        <button id="ranking-btn" class="small-btn">Ranking</button>
        <button id="upgrades-btn" class="small-btn">Ulepszenia</button>
        <button id="logout-btn" class="small-btn danger">Wyloguj</button>
      </div>
    </header>

    <main class="game-area">
      <div id="ranch-scene" class="scene">
        <img id="ranch-image" alt="Ranczo" />
        <button id="house-hitbox" class="hitbox" aria-label="Dom"></button>
        <button id="shed-hitbox" class="hitbox" aria-label="Szopa"></button>
        <button id="field-hitbox" class="hitbox" aria-label="Pole"></button>
      </div>
    </main>

    <div id="toast"></div>

    <div id="modal-backdrop" class="hidden">
      <div id="modal" class="panel"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
